<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kashi Library - Smart Registration Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 50%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            max-width: 520px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(15, 44, 89, 0.15);
            overflow: hidden;
        }

        .form-header {
            text-align: center;
            padding: 30px 30px 15px;
            background: linear-gradient(135deg, #0f2c59 0%, #0284c7 100%);
        }

        .lib-name {
            font-size: 28px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .motion-slogan {
            font-size: 14px;
            color: #bae6fd;
            margin-top: 8px;
        }

        .form-tabs {
            display: flex;
            background: #f1f5f9;
            margin: 20px 25px 15px;
            border-radius: 12px;
            padding: 5px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #0f2c59;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-body {
            padding: 0 25px 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0284c7 0%, #0f2c59 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.3);
        }

        .form-footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #64748b;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .success-overlay.active {
            display: flex;
        }

        .success-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
        }

        .success-icon {
            font-size: 60px;
            color: #16a34a;
            margin-bottom: 15px;
        }

        .close-action-btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }

        .admin-btn {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 10px;
        }

        #autoFillStatus {
            font-size: 12px;
            margin-top: 5px;
        }

        #seat-number-group {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <div class="lib-name">📚 KASHI LIBRARY</div>
        <div class="motion-slogan" id="typingSlogan"></div>
    </div>

    <div class="form-tabs">
        <button class="tab-btn active" onclick="switchTab('new')">✨ New Admission</button>
        <button class="tab-btn" onclick="switchTab('renew')">🔄 Renew Seat</button>
        <button class="tab-btn" onclick="switchTab('complaint')">⚠️ Complaint</button>
    </div>

    <form class="form-body" id="kashiForm" method="POST">
        <input type="hidden" name="form_type" id="formTypeInput" value="New">

        <div class="form-group">
            <label id="mobileLabel">📱 Mobile Number *</label>
            <input type="tel" name="mobile" id="mobileField" placeholder="Enter 10-digit mobile number" oninput="checkAutoFill()" required>
            <div id="autoFillStatus"></div>
            <button type="button" id="complaintLoginBtn" onclick="verifyComplaintUser()" style="display:none; width:100%; margin-top:10px; background:#0f2c59; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">Verify & Proceed</button>
        </div>

        <div id="complaintFormBlock" style="display:none;">
            <div class="form-group">
                <label>👤 Student Name</label>
                <input type="text" id="complaintNameField" readonly style="background:#f1f5f9;">
            </div>
            <div class="form-group">
                <label>📝 Your Complaint *</label>
                <textarea id="complaintMessageField" rows="4" placeholder="Describe your issue..."></textarea>
            </div>
            <button type="button" class="submit-btn" onclick="submitComplaintDirectly()">Submit Complaint</button>
        </div>

        <div id="admissionFieldsBlock">
            <div class="form-group">
                <label>👤 Full Name *</label>
                <input type="text" name="name" id="nameField" required>
            </div>

            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" id="emailField">
            </div>

            <div class="form-group">
                <label>🆔 Aadhar Number *</label>
                <input type="text" name="aadhar" id="aadharField" pattern="[0-9]{12}" required>
            </div>

            <div class="form-group">
                <label>📍 Full Address *</label>
                <textarea name="address" id="addressField" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>📖 Preparing For *</label>
                <input type="text" name="course" id="courseField" required>
            </div>

            <div class="form-group">
                <label>⏰ Select Shift *</label>
                <select name="shift" id="shiftSelect" onchange="filterSeats()" required>
                    <option value="">-- Choose Shift --</option>
                    <option value="Morning Shift (6:00 AM - 12:00 PM)">Morning Shift (6-12 PM)</option>
                    <option value="Afternoon Shift (12:00 PM - 6:00 PM)">Afternoon Shift (12-6 PM)</option>
                    <option value="Evening Shift (6:00 PM - 11:00 PM)">Evening Shift (6-11 PM)</option>
                    <option value="Full Day Plan (6:00 AM - 11:00 PM)">Full Day Plan</option>
                </select>
            </div>

            <div class="form-group">
                <label>💺 Seat Type</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="seat_type" value="fixed" checked onchange="toggleSmartSeat()"> Fixed Seat</label>
                    <label class="radio-item"><input type="radio" name="seat_type" value="flexible" onchange="toggleSmartSeat()"> Flexible Seat</label>
                </div>
            </div>

            <div class="form-group" id="seat-number-group">
                <label>🪑 Select Seat Number *</label>
                <select id="seat_no" name="seat_number">
                    <option value="">Select shift first</option>
                </select>
                <div id="seatStatus" style="font-size:12px; color:#0284c7; margin-top:5px;"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Register Now</button>
        </div>
    </form>

    <div class="form-footer">
        Harahua, Varanasi, Uttar Pradesh<br>
        Email: kashilibraryvnsofficial@gmail.com
        <div><button class="admin-btn" onclick="openAdminModal()">🔒 Admin Area</button></div>
    </div>
</div>

<div class="success-overlay" id="successOverlay">
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h3 id="successAlertTitle">Success!</h3>
        <p id="successAlertDesc">Data saved successfully.</p>
        <button class="close-action-btn" onclick="closeOverlay()">OK</button>
    </div>
</div>

<script>
// ✅ UPDATED WITH NEW DEPLOYMENT URL (Version 2 - Jun 6, 2026 2:12 AM)
const scriptUrl = "https://script.google.com/macros/s/AKfycbwqrs5C0f4Lvn6VChGLjgv6GmDMkvAXps1CubEM9k1exDSDQpWfmw9aA3yvNcvllqYb/exec";

let allBookings = [];
let allComplaints = [];

// Typing effect
const slogans = ["Focus Lives Here.", "Your Space To Succeed.", "Kashi Library Varanasi"];
let sloganIndex = 0, charIndex = 0, isDeleting = false;
const typingElement = document.getElementById("typingSlogan");

function typeEffect() {
    let current = slogans[sloganIndex];
    if (isDeleting) {
        typingElement.innerText = current.substring(0, charIndex - 1);
        charIndex--;
    } else {
        typingElement.innerText = current.substring(0, charIndex + 1);
        charIndex++;
    }
    let speed = isDeleting ? 40 : 100;
    if (!isDeleting && charIndex === current.length) {
        speed = 2000;
        isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
        isDeleting = false;
        sloganIndex = (sloganIndex + 1) % slogans.length;
        speed = 400;
    }
    setTimeout(typeEffect, speed);
}
setTimeout(typeEffect, 500);

function switchTab(type) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('kashiForm').reset();
    document.getElementById('autoFillStatus').style.display = 'none';
    document.getElementById('admissionFieldsBlock').style.display = 'block';
    document.getElementById('complaintFormBlock').style.display = 'none';
    document.getElementById('complaintLoginBtn').style.display = 'none';
    
    if (type === 'new') {
        document.querySelector('.tab-btn:first-child').classList.add('active');
        document.getElementById('formTypeInput').value = "New";
        document.getElementById('submitBtn').innerText = "Register Now";
        setFieldsReadOnly(false);
    } else if (type === 'renew') {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('formTypeInput').value = "Renew";
        document.getElementById('submitBtn').innerText = "Renew Seat";
    } else if (type === 'complaint') {
        document.querySelectorAll('.tab-btn')[2].classList.add('active');
        document.getElementById('formTypeInput').value = "Complaint";
        document.getElementById('mobileLabel').innerText = "📱 Registered Mobile Number *";
        document.getElementById('admissionFieldsBlock').style.display = 'none';
        document.getElementById('complaintFormBlock').style.display = 'block';
        document.getElementById('complaintLoginBtn').style.display = 'block';
    }
    toggleSmartSeat();
}

function setFieldsReadOnly(isReadOnly) {
    ['nameField', 'emailField', 'aadharField', 'addressField', 'courseField'].forEach(id => {
        document.getElementById(id).readOnly = isReadOnly;
    });
}

function checkAutoFill() {
    const type = document.getElementById('formTypeInput').value;
    const mobile = document.getElementById('mobileField').value.trim();
    const statusDiv = document.getElementById('autoFillStatus');
    
    if (type === 'Renew' && mobile.length === 10) {
        statusDiv.style.display = 'block';
        statusDiv.style.color = '#0284c7';
        statusDiv.innerText = "Searching...";
        
        fetch(`${scriptUrl}?mobile=${mobile}`)
            .then(res => res.json())
            .then(data => {
                if (data.found) {
                    document.getElementById('nameField').value = data.name;
                    document.getElementById('emailField').value = data.email;
                    document.getElementById('aadharField').value = data.aadhar;
                    document.getElementById('addressField').value = data.address;
                    document.getElementById('courseField').value = data.course;
                    statusDiv.style.color = '#16a34a';
                    statusDiv.innerText = "✓ Record found!";
                    setFieldsReadOnly(true);
                } else {
                    statusDiv.style.color = '#dc2626';
                    statusDiv.innerText = "✗ No record found";
                    setFieldsReadOnly(false);
                }
            }).catch(() => statusDiv.innerText = "Network error");
    } else {
        statusDiv.style.display = 'none';
    }
}

function verifyComplaintUser() {
    const mobile = document.getElementById('mobileField').value.trim();
    if (mobile.length !== 10) {
        alert("Enter valid 10-digit mobile number");
        return;
    }
    const statusDiv = document.getElementById('autoFillStatus');
    statusDiv.style.display = 'block';
    statusDiv.innerText = "Verifying...";
    
    fetch(`${scriptUrl}?mobile=${mobile}`)
        .then(res => res.json())
        .then(data => {
            if (data.found) {
                statusDiv.style.color = '#16a34a';
                statusDiv.innerText = "✓ Verified! Write your complaint.";
                document.getElementById('complaintNameField').value = data.name;
            } else {
                statusDiv.style.color = '#ea580c';
                statusDiv.innerText = "⚠ Guest mode - complaint will be anonymous";
                document.getElementById('complaintNameField').value = "Guest Student";
            }
            document.getElementById('complaintLoginBtn').style.display = 'none';
        }).catch(() => {
            statusDiv.innerText = "Continue as guest";
            document.getElementById('complaintNameField').value = "Library Student";
            document.getElementById('complaintLoginBtn').style.display = 'none';
        });
}

function submitComplaintDirectly() {
    const mobile = document.getElementById('mobileField').value.trim();
    const message = document.getElementById('complaintMessageField').value.trim();
    const name = document.getElementById('complaintNameField').value;
    
    if (!mobile || mobile.length !== 10) {
        alert("Enter valid mobile number");
        return;
    }
    if (!message) {
        alert("Please write your complaint");
        return;
    }
    
    const btn = event.target;
    btn.innerText = "Submitting...";
    btn.disabled = true;
    
    const params = new URLSearchParams();
    params.append("form_type", "Complaint");
    params.append("mobile", mobile);
    params.append("complaint_name", name || "Library Student");
    params.append("complaint_message", message);
    
    fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString()
    }).then(() => {
        document.getElementById('successAlertTitle').innerText = "Complaint Submitted!";
        document.getElementById('successAlertDesc').innerText = "Admin will review and take action.";
        document.getElementById('successOverlay').classList.add('active');
        document.getElementById('kashiForm').reset();
        switchTab('new');
        btn.innerText = "Submit Complaint";
        btn.disabled = false;
    }).catch(() => {
        alert("Error submitting complaint");
        btn.innerText = "Submit Complaint";
        btn.disabled = false;
    });
}

function fetchAllBookings() {
    fetch(scriptUrl)
        .then(res => res.json())
        .then(data => {
            allBookings = Array.isArray(data) ? data : [];
            if (allBookings.length && allBookings[0] && Array.isArray(allBookings[0])) {
                let formatted = [];
                for (let i = 1; i < allBookings.length; i++) {
                    if (allBookings[i][8]) {
                        formatted.push({
                            seat: allBookings[i][8].toString(),
                            name: allBookings[i][0] || "Unknown",
                            mobile: allBookings[i][1] || "N/A",
                            shift: allBookings[i][6] || "",
                            date: allBookings[i][10] || ""
                        });
                    }
                }
                allBookings = formatted;
            }
        }).catch(console.error);
}

function filterSeats() {
    const shift = document.getElementById('shiftSelect').value;
    if (!shift) return;
    
    const seatSelect = document.getElementById('seat_no');
    seatSelect.innerHTML = '<option value="">Select seat</option>';
    let available = 0;
    const today = new Date();
    
    for (let i = 1; i <= 40; i++) {
        let isBlocked = false;
        for (let j = allBookings.length - 1; j >= 0; j--) {
            if (allBookings[j].seat === i.toString()) {
                const bookingDate = allBookings[j].date ? new Date(allBookings[j].date.split("T")[0]) : null;
                const daysPassed = bookingDate ? Math.floor((today - bookingDate) / (86400000)) : 0;
                if (daysPassed < 30) {
                    if (allBookings[j].shift.includes("Full Day") || shift.includes("Full Day") || allBookings[j].shift === shift) {
                        isBlocked = true;
                        break;
                    }
                }
            }
        }
        if (!isBlocked) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `Seat ${i}`;
            seatSelect.appendChild(option);
            available++;
        }
    }
    document.getElementById('seatStatus').innerText = `${available} seats available`;
}

function toggleSmartSeat() {
    const fixed = document.getElementById('fixed').checked;
    const seatGroup = document.getElementById('seat-number-group');
    const seatSelect = document.getElementById('seat_no');
    if (fixed) {
        seatGroup.style.display = 'block';
        seatSelect.required = true;
    } else {
        seatGroup.style.display = 'none';
        seatSelect.required = false;
        seatSelect.value = "";
    }
}

function closeOverlay() {
    document.getElementById('successOverlay').classList.remove('active');
}

function openAdminModal() {
    const pass = prompt("Enter Admin Password:");
    if (pass === "Kashi@2026") {
        alert("✅ Admin access granted!");
    } else if (pass) {
        alert("❌ Wrong password!");
    }
}

// Form submission
document.getElementById('kashiForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const type = document.getElementById('formTypeInput').value;
    const btn = document.getElementById('submitBtn');
    btn.innerText = "Submitting...";
    btn.disabled = true;
    
    const formData = new FormData(this);
    
    fetch(scriptUrl, { method: 'POST', body: formData })
        .then(res => res.json())
        .then(() => {
            document.getElementById('successAlertTitle').innerText = 
                type === 'Renew' ? "🎉 Seat Renewed!" : "🎉 Registration Successful!";
            document.getElementById('successAlertDesc').innerText = 
                type === 'Renew' ? "Your seat has been renewed for 30 days." : "Welcome to Kashi Library!";
            document.getElementById('successOverlay').classList.add('active');
            this.reset();
            switchTab('new');
            fetchAllBookings();
        })
        .catch(() => {
            alert("❌ Error submitting form. Please try again.");
        })
        .finally(() => {
            btn.innerText = type === 'Renew' ? "Renew Seat" : "Register Now";
            btn.disabled = false;
        });
});

// Initial setup
toggleSmartSeat();
fetchAllBookings();
</script>
</body>
</html>
