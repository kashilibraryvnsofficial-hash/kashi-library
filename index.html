<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kashi Library - Smart Registration & Renewal Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 50%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #333333;
            position: relative;
            overflow-x: hidden;
        }

        /* 🌊 लाइव मूविंग बैकग्राउंड ग्रिड */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: 
                linear-gradient(to right, rgba(56, 189, 248, 0.06) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(56, 189, 248, 0.06) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            animation: backgroundMove 20s linear infinite;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* ✨ फॉर्म कंटेनर एंट्रेंस एलिमेशन */
        .form-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            max-width: 520px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(15, 44, 89, 0.1);
            overflow: hidden;
            position: relative;
            transform: translateY(30px);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 🌈 लाइव ग्रेडिएंट बॉर्डर्स (चारों तरफ के लिए) */
        .border-top, .border-bottom, .border-left, .border-right {
            position: absolute;
            background: linear-gradient(90deg, #0284c7, #38bdf8, #0f2c59, #0284c7);
            background-size: 300% 100%;
            animation: gradientShift 6s ease infinite;
            z-index: 5;
        }

        .border-top {
            top: 0;
            left: 0;
            width: 100%;
            height: 12px;
        }

        .border-bottom {
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
        }

        .border-left {
            top: 0;
            left: 0;
            width: 12px;
            height: 100%;
        }

        .border-right {
            top: 0;
            right: 0;
            width: 12px;
            height: 100%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* पैडिंग एडजस्टमेंट ताकि साइड बॉर्डर्स कंटेंट को न दबाएं */
        .form-header {
            text-align: center;
            padding: 40px 30px 15px;
        }

        .lib-name {
            font-size: 34px;
            color: #0f2c59;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(15, 44, 89, 0.05);
        }

        /* ✍️ टाइपिंग स्लोगन इफ़ेक्ट */
        .motion-slogan {
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
            color: #0284c7;
            display: inline-block;
            border-right: 2px solid #0284c7;
            white-space: nowrap;
            animation: blink 0.75s step-end infinite;
            min-height: 24px;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #0284c7; }
        }

        .form-tabs {
            display: flex;
            background: #f1f5f9;
            margin: 0 35px 15px;
            border-radius: 12px;
            padding: 5px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 10px;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #0f2c59;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            transform: scale(1.02);
        }

        .form-body {
            padding: 0 35px 25px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13.5px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14.5px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* ⚡ इनपुट फोकस मोशन */
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            background-color: #ffffff;
            border-color: #0284c7;
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15);
            transform: translateY(-2px);
        }

        .form-group:focus-within label {
            color: #0284c7;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14.5px;
            cursor: pointer;
        }

        .radio-item input {
            cursor: pointer;
            width: auto;
        }

        #seat-number-group {
            background-color: #f0f9ff;
            padding: 18px;
            border-radius: 14px;
            border: 1px dashed #bae6fd;
            transition: all 0.4s ease;
        }

        /* 🚀 सबमिट बटन पल्स एनिमेशन */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0284c7 0%, #0f2c59 100%);
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.25);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* बटन रिपल शाइन इफ़ेक्ट */
        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
            opacity: 0;
        }

        .submit-btn:hover::after {
            left: 125%;
            opacity: 1;
        }

        .form-footer {
            text-align: center;
            padding: 22px 30px 30px; /* नीचे के बॉर्डर के लिए स्पेस */
            font-size: 12px;
            color: #64748b;
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        /* ✍️ डवलपर क्रेडिट स्टाइल */
        .designer-credit {
            margin-top: 10px;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .designer-credit span {
            color: #0284c7;
        }

        /* 🎉 एडवांस्ड लाइव सक्सेस अलर्ट ओवरले */
        .success-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 30px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .success-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* बाउंसिंग सक्सेस टिक */
        .success-icon {
            font-size: 70px;
            color: #16a34a;
            margin-bottom: 20px;
            transform: scale(0);
        }

        .success-overlay.active .success-icon {
            animation: popInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.2s;
        }

        @keyframes popInScale {
            to { transform: scale(1); }
        }

        .close-action-btn {
            background: linear-gradient(135deg, #0284c7 0%, #0f2c59 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(2, 132, 199, 0.2);
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .close-action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(2, 132, 199, 0.3);
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="border-top"></div>
    <div class="border-bottom"></div>
    <div class="border-left"></div>
    <div class="border-right"></div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✓</div>
        <h2 style="color: #0f2c59; margin-bottom: 10px; font-size: 24px;" id="successAlertTitle">Admission Successful!</h2>
        <p style="color: #64748b; font-size: 14px; max-width: 80%;">Data has been saved to Kashi Library Database successfully.</p>
        <button class="close-action-btn" onclick="closeOverlay()">OK / Continue</button>
    </div>

    <div class="form-header">
        <div class="lib-name">Kashi Library</div>
        <div class="motion-slogan" id="typingSlogan"></div>
    </div>

    <div class="form-tabs">
        <button class="tab-btn active" onclick="switchTab('new')">New Admission</button>
        <button class="tab-btn" onclick="switchTab('renew')">Renew Seat</button>
    </div>

    <form class="form-body" id="kashiForm" action="https://script.google.com/macros/s/AKfycbyR70EclrPUHT6pgVCvILSIneqR3NtO5f-6nuQn9rxT2hmExMLGmFNjq3HVj4wRzW1g/exec" method="POST">
        
        <input type="hidden" name="form_type" id="formTypeInput" value="New">

        <div class="form-group">
            <label>Mobile Number / मोबाइल नंबर *</label>
            <input type="tel" name="mobile" id="mobileField" pattern="[0-9]{10}" placeholder="10-digit mobile number" oninput="checkAutoFill()" required>
            <div id="autoFillStatus" style="font-size: 12px; color: #0284c7; font-style: italic; margin-top: 4px; display:none;"></div>
        </div>

        <div class="form-group">
            <label>Student Full Name / छात्र का नाम *</label>
            <input type="text" name="name" id="nameField" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Email Address / ईमेल आईडी</label>
            <input type="email" name="email" id="emailField" placeholder="username@gmail.com">
        </div>

        <div class="form-group">
            <label>Aadhar Number / आधार नंबर *</label>
            <input type="text" name="aadhar" id="aadharField" pattern="[0-9]{12}" placeholder="12-digit Aadhar number" required>
        </div>

        <div class="form-group">
            <label>Full Address / पूरा पता *</label>
            <textarea name="address" id="addressField" placeholder="Enter your full address" required></textarea>
        </div>

        <div class="form-group">
            <label>Preparing For / परीक्षा का नाम *</label>
            <input type="text" name="course" id="courseField" placeholder="e.g., SSC, Railway, UPSC" required>
        </div>

        <div class="form-group">
            <label>Select Shift / शिफ्ट चुनें *</label>
            <select name="shift" id="shiftSelect" onchange="filterSeats()" required>
                <option value="" disabled selected>-- Choose your shift timing --</option>
                <option value="Morning Shift (6:00 AM - 12:00 PM)">Morning Shift (6:00 AM - 12:00 PM)</option>
                <option value="Afternoon Shift (12:00 PM - 6:00 PM)">Afternoon Shift (12:00 PM - 6:00 PM)</option>
                <option value="Evening Shift (6:00 PM - 11:00 PM)">Evening Shift (6:00 PM - 11:00 PM)</option>
                <option value="Full Day Plan (6:00 AM - 11:00 PM)">Full Day Plan (6:00 AM - 11:00 PM)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Seat Type / सीट का प्रकार *</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="fixed" name="seat_type" value="fixed" checked onchange="toggleSmartSeat()">
                    <label for="fixed">Fixed Seat</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="flexible" name="seat_type" value="flexible" onchange="toggleSmartSeat()">
                    <label for="flexible">Flexible Seat</label>
                </div>
            </div>
        </div>

        <div class="form-group" id="seat-number-group">
            <label for="seat_no">Select Your Seat Number (1-40) *</label>
            <select id="seat_no" name="seat_number" required>
                <option value="" disabled selected>Please select a shift first...</option>
            </select>
            <div id="seatStatus" style="font-size: 12px; color: #0284c7; font-style: italic; margin-top: 4px;">Waiting for shift...</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Register Now</button>
    </form>

    <div class="form-footer">
        Harahua, Varanasi, Uttar Pradesh<br>
        <strong>Email:</strong> kashilibraryvnsofficial@gmail.com
        <div class="designer-credit">Website designed by <span>Anurag</span></div>
    </div>
</div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyR70EclrPUHT6pgVCvILSIneqR3NtO5f-6nuQn9rxT2hmExMLGmFNjq3HVj4wRzW1g/exec";
    let allBookings = []; 

    // ✍️ जादुई स्लोगन टाइपिंग एलिमेशन स्क्रिप्ट
    const slogans = ["Focus Lives Here.", "Your Space To Succeed.", "भेलखां नियर SAMS इंस्टिट्यूट की डिजिटल लाइब्रेरी।"];
    let sloganIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingElement = document.getElementById("typingSlogan");

    function typeEffect() {
        let currentSlogan = slogans[sloganIndex];
        if (isDeleting) {
            typingElement.innerText = currentSlogan.substring(0, charIndex - 1);
            charIndex--;
        } else {
            typingElement.innerText = currentSlogan.substring(0, charIndex + 1);
            charIndex++;
        }

        let typingSpeed = isDeleting ? 40 : 100;

        if (!isDeleting && charIndex === currentSlogan.length) {
            typingSpeed = 2000; 
            isDeleting = true;
        } else if (isDeleting && charIndex === 0) {
            isDeleting = false;
            sloganIndex = (sloganIndex + 1) % slogans.length;
            typingSpeed = 400; 
        }

        setTimeout(typeEffect, typingSpeed);
    }

    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(typeEffect, 500);
    });

    const seatSelectElement = document.getElementById('seat_no');
    const seatStatusElement = document.getElementById('seatStatus');
    const shiftSelectElement = document.getElementById('shiftSelect');
    const mobileField = document.getElementById('mobileField');
    const autoFillStatus = document.getElementById('autoFillStatus');

    function switchTab(type) {
        const tabs = document.querySelectorAll('.tab-btn');
        const submitBtn = document.getElementById('submitBtn');
        const formTypeInput = document.getElementById('formTypeInput');
        const form = document.getElementById('kashiForm');

        tabs.forEach(tab => tab.classList.remove('active'));
        form.reset(); 
        autoFillStatus.style.display = 'none';

        if(type === 'new') {
            tabs[0].classList.add('active');
            submitBtn.innerText = "Register Now";
            formTypeInput.value = "New";
            setFieldsReadOnly(false);
        } else {
            tabs[1].classList.add('active');
            submitBtn.innerText = "Renew My Seat";
            formTypeInput.value = "Renew";
        }
        toggleSmartSeat();
    }

    function setFieldsReadOnly(isReadOnly) {
        document.getElementById('nameField').readOnly = isReadOnly;
        document.getElementById('emailField').readOnly = isReadOnly;
        document.getElementById('aadharField').readOnly = isReadOnly;
        document.getElementById('addressField').readOnly = isReadOnly;
        document.getElementById('courseField').readOnly = isReadOnly;
    }

    function checkAutoFill() {
        const currentType = document.getElementById('formTypeInput').value;
        const mobileNum = mobileField.value.trim();

        if (currentType === 'Renew' && mobileNum.length === 10) {
            autoFillStatus.style.display = 'block';
            autoFillStatus.style.color = '#0284c7';
            autoFillStatus.innerText = "Searching student record...";

            fetch(`${scriptUrl}?mobile=${mobileNum}`)
                .then(res => res.json())
                .then(data => {
                    if (data.found) {
                        document.getElementById('nameField').value = data.name;
                        document.getElementById('emailField').value = data.email;
                        document.getElementById('aadharField').value = data.aadhar;
                        document.getElementById('addressField').value = data.address;
                        document.getElementById('courseField').value = data.course;
                        autoFillStatus.style.color = '#16a34a';
                        autoFillStatus.innerText = "Record found! Form filled automatically.";
                        setFieldsReadOnly(true); 
                    } else {
                        autoFillStatus.style.color = '#dc2626';
                        autoFillStatus.innerText = "No record found.";
                        setFieldsReadOnly(false);
                    }
                }).catch(err => { autoFillStatus.innerText = "Network error."; });
        } else { autoFillStatus.style.display = 'none'; }
    }

    function fetchAllBookings() {
        fetch(scriptUrl)
            .then(response => response.json())
            .then(data => {
                allBookings = Array.isArray(data) ? data : [];
                
                if (allBookings.length > 0 && Array.isArray(allBookings[0])) {
                    let formatted = [];
                    for(let i=1; i<allBookings.length; i++) {
                        if(allBookings[i][8]) {
                            formatted.push({
                                seat: allBookings[i][8].toString(),
                                shift: allBookings[i][6] ? allBookings[i][6].toString() : "",
                                date: allBookings[i][10] ? allBookings[i][10].toString() : ""
                            });
                        }
                    }
                    allBookings = formatted;
                }

                if(seatStatusElement.innerText.includes("Waiting")) {
                    seatStatusElement.style.color = "#16a34a";
                    seatStatusElement.innerText = "System online. Choose shift to check seats.";
                }
            }).catch(error => console.error('Error:', error));
    }

    function filterSeats() {
        const selectedShift = shiftSelectElement.value;
        if (!selectedShift) return;

        seatSelectElement.innerHTML = '<option value="" disabled selected>-- Choose a Seat --</option>';
        let availableCount = 0;
        const today = new Date();

        for (let i = 1; i <= 40; i++) {
            let seatStr = i.toString();
            let isBlocked = false;
            let latestBookingForThisSeat = null;

            for (let j = allBookings.length - 1; j >= 0; j--) {
                if (allBookings[j].seat === seatStr) {
                    latestBookingForThisSeat = allBookings[j];
                    break; 
                }
            }

            if (latestBookingForThisSeat) {
                let bookingDate = null;
                if (latestBookingForThisSeat.date) {
                    let dStr = latestBookingForThisSeat.date.split("T")[0];
                    bookingDate = new Date(dStr);
                }
                
                let daysPassed = 0;
                if (bookingDate && !isNaN(bookingDate.getTime())) {
                    let timeDiff = today.getTime() - bookingDate.getTime();
                    daysPassed = Math.floor(timeDiff / (1000 * 3600 * 24));
                }

                if (bookingDate && !isNaN(bookingDate.getTime()) && daysPassed >= 30) {
                    isBlocked = false;
                } else {
                    if (latestBookingForThisSeat.shift.includes("Full Day Plan")) {
                        isBlocked = true;
                    } else if (selectedShift.includes("Full Day Plan")) {
                        isBlocked = true;
                    } else if (latestBookingForThisSeat.shift === selectedShift) {
                        isBlocked = true;
                    }
                }
            }

            if (!isBlocked) {
                let option = document.createElement('option');
                option.value = i;
                option.textContent = `Seat No. ${i}`;
                seatSelectElement.appendChild(option);
                availableCount++;
            }
        }
        seatStatusElement.style.color = "#0284c7";
        seatStatusElement.innerText = `${availableCount} seats available for this shift.`;
    }

    function toggleSmartSeat() {
        const fixedRadioInput = document.getElementById('fixed');
        const seatGroupElement = document.getElementById('seat-number-group');
        const seatSelectionElement = document.getElementById('seat_no');

        if (fixedRadioInput.checked) {
            seatGroupElement.style.display = 'block';
            seatSelectionElement.required = true;
        } else {
            seatGroupElement.style.display = 'none';
            seatSelectionElement.required = false;
            seatSelectionElement.value = ""; 
        }
    }

    function closeOverlay() {
        const overlay = document.getElementById('successOverlay');
        overlay.classList.remove('active');
        setTimeout(() => { overlay.style.display = 'none'; }, 400);
    }

    toggleSmartSeat();
    fetchAllBookings();

    document.getElementById('kashiForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const form = this;
        const currentType = document.getElementById('formTypeInput').value;
        
        btn.innerText = "Submitting...";
        btn.disabled = true;

        if(currentType === 'Renew') {
            document.getElementById('successAlertTitle').innerText = "Seat Renewal Successful!";
        } else {
            document.getElementById('successAlertTitle').innerText = "Admission Successful!";
        }

        const formData = new FormData(form);

        fetch(form.action, { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if(data.result === 'success') {
                const overlay = document.getElementById('successOverlay');
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.classList.add('active'); }, 10);
                
                setFieldsReadOnly(false);
                form.reset();
                
                fetch(scriptUrl)
                    .then(res => res.json())
                    .then(newData => {
                        allBookings = Array.isArray(newData) ? newData : [];
                        btn.innerText = currentType === 'Renew' ? "Renew My Seat" : "Register Now";
                        btn.disabled = false;
                    });
            }
        })
        .catch(error => {
            const overlay = document.getElementById('successOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.classList.add('active'); }, 10);
            
            form.reset();
            btn.disabled = false;
            btn.innerText = currentType === 'Renew' ? "Renew My Seat" : "Register Now";
        });
    });
</script>

</body>
</html>
